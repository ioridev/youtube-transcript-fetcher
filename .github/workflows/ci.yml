name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install yt-dlp
        run: |
          sudo apt-get update
          sudo apt-get install -y yt-dlp jq

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: CLI help works
        run: ./youtube-transcript-fetcher --help

      - name: URL parsing sanity check
        run: |
          python - <<'PY'
          from scripts.youtube_transcript_fetcher import extract_video_id

          cases = {
              'YDdKiQNw80c': 'YDdKiQNw80c',
              'https://www.youtube.com/watch?v=YDdKiQNw80c': 'YDdKiQNw80c',
              'https://youtu.be/YDdKiQNw80c': 'YDdKiQNw80c',
              'https://www.youtube.com/shorts/YDdKiQNw80c': 'YDdKiQNw80c',
          }
          for raw, expected in cases.items():
              actual = extract_video_id(raw)
              assert actual == expected, (raw, actual, expected)
          print('URL parsing OK')
          PY

      - name: Deterministic module sanity check
        run: |
          python - <<'PY'
          from scripts.youtube_transcript_fetcher import process_video

          result = process_video('invalid_video_id')
          assert result['error'] == 'Failed to fetch video details'
          assert result['video_id'] == 'invalid_video_id'
          print('Deterministic sanity OK')
          PY

  live-smoke:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install yt-dlp
        run: |
          sudo apt-get update
          sudo apt-get install -y yt-dlp jq

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Single video live smoke test
        run: |
          ./youtube-transcript-fetcher --url 'https://www.youtube.com/watch?v=CCK276P_RYs' --output /tmp/youtube_transcript_fetcher_ci.json
          jq '.items[0] | {title, channel, has_transcript, transcript_len: (.transcript|length)}' /tmp/youtube_transcript_fetcher_ci.json
